version: 2

models:
  - name: dim_listings_cleansed
    description: "This table contains the details of the Airbnb listings, including the listing ID, name, host ID."
    data_tests:
      - minimum_row_count:
          arguments:
            min_row_count: 1000
    columns:
      - name: listing_id
        description: "The unique identifier for each listing."
        data_tests:
          - not_null
          - unique
      - name: host_id
        description: "The unique identifier for each host. References the host_id in the dim_hosts_cleansed table."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_hosts_cleansed')
                field: host_id
      - name: room_type
        description: "The type of room offered in the listing (e.g., Entire home/apt, Private room, Shared room)."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Shared room', 'Hotel room', 'Private room', 'Entire home/apt']
      - name: minimum_nights
        description: '{{ doc("dim_listing_cleansed__minimum_nights") }}'
        data_tests:
          - not_null
          - positive_values

  - name: dim_hosts_cleansed
    config:
        contract:
          enforced: true
    description: "This table contains the details of the Airbnb hosts, including the host ID, name, and superhost status."
    columns:
      - name: host_id
        description: "The unique identifier for each host."
        data_type: integer
        data_tests:
          - not_null
          - unique
      - name: host_name
        description: "The name of the host. 'Anonymous' is used for hosts who have chosen to hide their identity."
        data_type: string
        data_tests:
          - not_null
      - name: is_superhost
        description: "Indicates whether the host is a superhost (true) or not (false)."
        data_type: string
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['t', 'f']
      - name: created_at
        description: "The date and time when the host profile was created."
        data_type: timestamp        
      - name: updated_at
        description: "The date and time when the host profile was last updated."
        data_type: timestamp
